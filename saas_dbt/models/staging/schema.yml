version: 2

models:

  - name: stg_customers
    description: "Cleaned customer data"
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: email
        tests:
          - not_null

  - name: stg_subscriptions
    description: "Cleaned subscription data"
    columns:
      - name: subscription_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null